<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Godguttengames</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #fdf6e3;
      --tomato-red: #e8392a;
      --tomato-green: #3a7d44;
      --leaf-green: #2d6a35;
      --dark: #1a1a1a;
      --card-bg: rgba(255,255,255,0.82);
      --shadow: 0 8px 32px rgba(0,0,0,0.13);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      background-color: var(--cream);
      overflow-x: hidden;
    }

    .wallpaper {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .tomato-grid {
      position: absolute;
      inset: -80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, 72px);
      grid-auto-rows: 72px;
      transform: rotate(45deg) scale(1.5);
      opacity: 0.18;
      gap: 18px;
    }

    .tomato {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      user-select: none;
    }

    .content {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 64px;
    }

    .logo-dog {
      display: block;
      width: 110px;
      height: 110px;
      margin: 0 auto 12px;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.18));
      object-fit: cover;
      mix-blend-mode: multiply;
      background: transparent;
    }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.8rem, 7vw, 5rem);
      color: var(--tomato-red);
      letter-spacing: 1px;
      line-height: 1;
      text-shadow: 3px 3px 0px rgba(232,57,42,0.18);
    }

    .tagline {
      margin-top: 14px;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--tomato-green);
      letter-spacing: 0.5px;
    }

    .games-label {
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--tomato-green);
      margin-bottom: 28px;
      opacity: 0.7;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
      width: 100%;
      max-width: 960px;
    }

    /* -- Active game card -- */
    .game-card {
      background: var(--card-bg);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 40px 32px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      backdrop-filter: blur(6px);
      border: 2px solid rgba(255,255,255,0.7);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .game-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 18px 48px rgba(0,0,0,0.18);
    }

    /* -- Inactive / Coming Soon card -- */
    .game-card-inactive {
      background: rgba(255,255,255,0.45);
      border-radius: 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      padding: 40px 32px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      backdrop-filter: blur(4px);
      border: 2px solid rgba(255,255,255,0.5);
      cursor: default;
      text-decoration: none;
      color: inherit;
      position: relative;
      filter: grayscale(0.55) opacity(0.65);
    }

    .coming-soon-badge {
      position: absolute;
      top: 18px;
      right: 18px;
      background: #aaa;
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 0.72rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 50px;
    }

    .game-icon {
      width: 80px;
      height: 80px;
      margin-bottom: 18px;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.12));
    }

    .game-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.55rem;
      color: var(--dark);
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .game-card-inactive .game-title {
      color: #888;
    }

    .game-desc {
      font-size: 0.95rem;
      color: #666;
      line-height: 1.6;
      margin-bottom: 28px;
      flex-grow: 1;
      min-height: 8px;
    }

    .play-btn {
      display: inline-block;
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1.05rem;
      letter-spacing: 1px;
      padding: 12px 36px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.18s ease;
    }

    /* Mission: LUU - featured card */
    .card-luu {
      border: 2px solid rgba(79,196,207,0.35);
      background: linear-gradient(135deg, rgba(255,255,255,0.92) 0%, rgba(240,252,253,0.92) 100%);
      box-shadow: 0 8px 32px rgba(79,196,207,0.18), var(--shadow);
    }

    .card-luu:hover {
      box-shadow: 0 18px 48px rgba(79,196,207,0.28), 0 18px 48px rgba(0,0,0,0.12);
    }

    .card-luu .play-btn {
      background: linear-gradient(135deg, #4fc4cf, #3aa8b2);
      box-shadow: 0 4px 14px rgba(79,196,207,0.45);
      letter-spacing: 2px;
    }

    .card-luu .play-btn:hover {
      background: linear-gradient(135deg, #3ab4be, #2a9aa4);
      transform: scale(1.06);
    }

    .card-luu .game-title {
      font-family: 'Fredoka One', cursive;
      color: #1a3a3e;
      letter-spacing: 3px;
      font-size: 1.8rem;
    }

    .new-badge {
      position: absolute;
      top: 18px;
      right: 18px;
      background: linear-gradient(135deg, #4fc4cf, #3aa8b2);
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 0.72rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 50px;
      box-shadow: 0 2px 8px rgba(79,196,207,0.4);
    }

    .card-1 .play-btn { background: var(--tomato-red); box-shadow: 0 4px 14px rgba(232,57,42,0.35); }
    .card-2 .play-btn { background: #e07b1a; box-shadow: 0 4px 14px rgba(224,123,26,0.35); }
    .card-3 .play-btn { background: var(--tomato-green); box-shadow: 0 4px 14px rgba(58,125,68,0.35); }

    footer {
      margin-top: 72px;
      font-size: 0.85rem;
      color: #aaa;
      text-align: center;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    header { animation: fadeUp 0.7s ease both; }
    .game-card:nth-child(1) { animation: fadeUp 0.7s 0.15s ease both; }
    .game-card-inactive:nth-child(2) { animation: fadeUp 0.7s 0.25s ease both; }
  </style>
</head>
<body>

  <div class="wallpaper">
    <div class="tomato-grid" id="tomatoGrid"></div>
  </div>

  <div class="content">

    <header>
      <img class="logo-dog" src="logo.jpg" alt="Godguttengames logo" />
      <h1>Godguttengames</h1>
    </header>

    <p class="games-label">Choose your game</p>

    <div class="games-grid">

      <!-- Mission: LUU - active featured card -->
      <a class="game-card card-luu" href="games/mission-luu/index.html" style="position:relative;">
        <span class="new-badge">New</span>

          <line x1="51" y1="22" x2="54" y2="19" stroke="#4fc4cf" stroke-width="2" stroke-linecap="round"/>
          <line x1="57" y1="33" x2="61" y2="31" stroke="#4fc4cf" stroke-width="2" stroke-linecap="round"/>
          <line x1="29" y1="22" x2="26" y2="19" stroke="#4fc4cf" stroke-width="2" stroke-linecap="round"/>
          <line x1="23" y1="33" x2="19" y2="31" stroke="#4fc4cf" stroke-width="2" stroke-linecap="round"/>
          <circle cx="63" cy="58" r="9" fill="#cf4f6a" opacity="0.82"/>
          <circle cx="63" cy="58" r="6" fill="#e07088"/>
          <circle cx="63" cy="56" r="2.5" fill="#8a1a2a" opacity="0.6"/>
          <line x1="63" y1="49" x2="63" y2="46" stroke="#cf4f6a" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="70" y1="53" x2="72" y2="51" stroke="#cf4f6a" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="56" y1="53" x2="54" y2="51" stroke="#cf4f6a" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="18" cy="55" r="2.5" fill="#c8a96e" opacity="0.8"/>
          <circle cx="12" cy="46" r="1.8" fill="#c8a96e" opacity="0.55"/>
          <circle cx="22" cy="64" r="1.5" fill="#c8a96e" opacity="0.5"/>
        </svg>
        <div class="game-title">Mission: LUU</div>
        <p class="game-desc">Cooperative card game. Cultivate Luu creatures, draft your deck, and fight parasite-infected Rogues across five alien sectors.</p>
        <span class="play-btn">Play Now</span>
      </a>

      <!-- Junkyard Dogs - inactive -->
      <div class="game-card-inactive" style="position:relative;">
        <span class="coming-soon-badge">Coming Soon</span>
        <svg class="game-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(8,62) rotate(-3)">
            <rect x="0" y="-8" width="34" height="10" rx="2" fill="#3a7d44"/>
            <rect x="5" y="-14" width="20" height="8" rx="2" fill="#2d6a35"/>
            <circle cx="7" cy="3" r="3.5" fill="#222"/>
            <circle cx="27" cy="3" r="3.5" fill="#222"/>
          </g>
          <g transform="translate(6,50) rotate(4)">
            <rect x="0" y="-8" width="34" height="10" rx="2" fill="#2255aa"/>
            <rect x="4" y="-14" width="22" height="8" rx="2" fill="#1a4488"/>
            <circle cx="7" cy="3" r="3.5" fill="#222"/>
            <circle cx="27" cy="3" r="3.5" fill="#222"/>
          </g>
          <g transform="translate(9,38) rotate(-2)">
            <rect x="0" y="-8" width="32" height="10" rx="2" fill="#e8c820"/>
            <rect x="5" y="-14" width="19" height="8" rx="2" fill="#c8a800"/>
            <circle cx="6" cy="3" r="3.5" fill="#222"/>
            <circle cx="26" cy="3" r="3.5" fill="#222"/>
          </g>
          <g transform="translate(7,26) rotate(3)">
            <rect x="0" y="-8" width="33" height="10" rx="2" fill="#e07820"/>
            <rect x="4" y="-14" width="21" height="8" rx="2" fill="#c06010"/>
            <circle cx="7" cy="3" r="3.5" fill="#222"/>
            <circle cx="26" cy="3" r="3.5" fill="#222"/>
          </g>
          <g transform="translate(10,14) rotate(-4)">
            <rect x="0" y="-8" width="32" height="10" rx="2" fill="#e03020"/>
            <rect x="5" y="-15" width="18" height="9" rx="2" fill="#c02010"/>

          </g>
        </svg>
        <div class="game-title">Junkyard Dogs</div>
        <p class="game-desc"></p>
      </div>


    </div>

    <footer>&copy; 2025 Godguttengames &nbsp;&middot;&nbsp; All games designed &amp; owned by the creator</footer>

  </div>

  <script>
    const grid = document.getElementById('tomatoGrid');
    for (let i = 0; i < 300; i++) {
      const div = document.createElement('div');
      div.className = 'tomato';
      div.textContent = '🍅';
      grid.appendChild(div);
    }
  </script>

</body>
</html>
