<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Godguttengames</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #fdf6e3;
      --tomato-red: #e8392a;
      --tomato-green: #3a7d44;
      --leaf-green: #2d6a35;
      --dark: #1a1a1a;
      --card-bg: rgba(255,255,255,0.82);
      --shadow: 0 8px 32px rgba(0,0,0,0.13);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      background-color: var(--cream);
      overflow-x: hidden;
    }

    .wallpaper {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .tomato-grid {
      position: absolute;
      inset: -80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, 72px);
      grid-auto-rows: 72px;
      transform: rotate(45deg) scale(1.5);
      opacity: 0.18;
      gap: 18px;
    }

    .tomato {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      user-select: none;
    }

    .content {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 64px;
    }

    .logo-dog {
      display: block;
      width: 110px;
      height: 110px;
      margin: 0 auto 12px;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.18));
    }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.8rem, 7vw, 5rem);
      color: var(--tomato-red);
      letter-spacing: 1px;
      line-height: 1;
      text-shadow: 3px 3px 0px rgba(232,57,42,0.18);
    }

    .tagline {
      margin-top: 14px;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--tomato-green);
      letter-spacing: 0.5px;
    }

    .games-label {
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--tomato-green);
      margin-bottom: 28px;
      opacity: 0.7;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
      width: 100%;
      max-width: 960px;
    }

    .game-card {
      background: var(--card-bg);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 40px 32px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      backdrop-filter: blur(6px);
      border: 2px solid rgba(255,255,255,0.7);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .game-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 18px 48px rgba(0,0,0,0.18);
    }

    .game-icon {
      width: 80px;
      height: 80px;
      margin-bottom: 18px;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.12));
    }

    .game-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.55rem;
      color: var(--dark);
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .game-desc {
      font-size: 0.95rem;
      color: #666;
      line-height: 1.6;
      margin-bottom: 28px;
      flex-grow: 1;
      min-height: 8px;
    }

    .play-btn {
      display: inline-block;
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1.05rem;
      letter-spacing: 1px;
      padding: 12px 36px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .card-1 .play-btn { background: var(--tomato-red); box-shadow: 0 4px 14px rgba(232,57,42,0.35); }
    .card-1 .play-btn:hover { background: #c42d1f; transform: scale(1.06); }
    .card-2 .play-btn { background: #e07b1a; box-shadow: 0 4px 14px rgba(224,123,26,0.35); }
    .card-2 .play-btn:hover { background: #c56a10; transform: scale(1.06); }
    .card-3 .play-btn { background: var(--tomato-green); box-shadow: 0 4px 14px rgba(58,125,68,0.35); }
    .card-3 .play-btn:hover { background: var(--leaf-green); transform: scale(1.06); }

    footer {
      margin-top: 72px;
      font-size: 0.85rem;
      color: #aaa;
      text-align: center;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    header { animation: fadeUp 0.7s ease both; }
    .game-card:nth-child(1) { animation: fadeUp 0.7s 0.15s ease both; }
    .game-card:nth-child(2) { animation: fadeUp 0.7s 0.28s ease both; }
    .game-card:nth-child(3) { animation: fadeUp 0.7s 0.41s ease both; }
  </style>
</head>
